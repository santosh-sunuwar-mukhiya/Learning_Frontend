<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <h1>Generate a <span>random password</span></h1>
        <p class="subheading">Never use an insecure password again.</p>
        <input type="number" id="pass-length" placeholder="Enter Password Length">
        <button id="generate-password">Generate passwords</button>
        <p id="passwordregular-el" class="pwd">regular password</p>
        <p id="passwordmixed-el" class="pwd">mixed password</p>
    </div>
    <script src="./index.js"></script>
</body>
</html>
