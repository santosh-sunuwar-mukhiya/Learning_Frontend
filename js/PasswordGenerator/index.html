<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <button id="btn" onclick="darkLight()">light</button>
    <div class="container" id="container">
        <div class="info">
            <h1><span class="logo">Generate a</span><span class="sub-logo"> random password</span></h1>
            <p class="subheading">Never use an insecure password again.</p>
        </div>
        <div class="card">
            <input type="number" id="pass-length" placeholder="Enter Password Length">
            <button id="generate-password" onclick="generatePassword()">Generate passwords</button>
            <div class="pwd-group" style="display: flex; gap: 10px;">
                <p id="passwordregular-el" class="pwd" style="flex-grow: 1;"></p>
                <span onclick="copyPassword('passwordregular-el')" style="cursor: pointer; font-size: 1.5rem;">📋</span>
            </div>

            <div class="pwd-group" style="display: flex; gap: 10px;">
                <p id="passwordmixed-el" class="pwd" style="flex-grow: 1;"></p>
                <span onclick="copyPassword('passwordmixed-el')" style="cursor: pointer; font-size: 1.5rem;">📋</span>
            </div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
