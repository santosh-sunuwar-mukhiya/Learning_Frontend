  <h1>Tea Recepie App</h1>
  <p>A simple tea recepie application.</p>
</header>
<main>
  <section>
    <h2>Ingredients</h2>
    <ul>
      <li>water</li>
      <li>milk</li>
      <li>sugar</li>
      <li>Kettle</li>
    </ul>
  </section>
  <section>
    <h2>Instructions</h2>
    <ol>
      <li>Get a water of glass.</li>
      <li>Put water on kettle.</li>
      <li>Put tablespoon sugar on kettle.</li>
      <li>Turn on stove for 5 minutes</li>
    </ol>
