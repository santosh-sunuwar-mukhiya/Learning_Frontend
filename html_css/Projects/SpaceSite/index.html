<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoWorking Space Site</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>WeBarelyWork</li>
                <li><img src="./assets/pin.png" alt="pin image" class="icon"></li>
                <li><img src="./assets/burger.png" alt="Hamburger image" class="icon"></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>The best coworking spaces for lazy devs.</h1>
        </section>

        <section class="item">
            <img src="./assets/hygge.jpg" alt="A smart coworking space" class="item-img">
            <div class="img-banner">
                Exclusive
            </div>

            <div class="caption">
                <p>Skiving in Scandinavia? Relax with a latte at Hygge Lounge.</p>
                <button>Book</button>
            </div>
        </section>

        <section class="item">
            <img src="./assets/sky-garden.jpg" alt="A smart coworking space" class="item-img">

            <div class="caption">
                <p>Bored in Barcelona? Take a siesta at the Sky Garden.</p>
                <button>Book</button>
            </div>
        </section>

        <section class="item">
            <img src="./assets/generator.jpg" alt="A smart coworking space" class="item-img">

            <div class="caption">
                <p>Relaxing in Rio? Take some downtime at the Generator Hub.</p>
                <button>Book</button>
            </div>
        </section>
    </main>
</body>
</html>
