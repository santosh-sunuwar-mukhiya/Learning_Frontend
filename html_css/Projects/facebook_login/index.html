<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
     <div class="container">
        <div class="left-col">
            <p class="language">English(US)</p>

            <div class="card">
                <h1>Explore the things <span>you love.</span></h1>
                <img src="./gpt-main.png" alt="facebook image" class="main-img">
            </div>
            
        </div>

        <div class="right-col">
            <img src="./logo.png" alt="facebook logo" class="logo" />

            <form>
                <input type="text" id="name" placeholder="Mobile number or email">
                <input type="password" id="password" placeholder="password">
                <button class="btn primary-btn">Log in</button>
                <p><a href="#" class="link">Forget password?</a></p>
            </form>

            <button class="btn new">Create new account</button>
            <div class="footer">
                <img src="./meta.png" alt="meta logo" class="meta">Meta
            </div>
        </div>

     </div>
</body>
</html>
