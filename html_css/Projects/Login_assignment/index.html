<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="container">
        <div class="intro card">
            <h1>Welcome back</h1>
            <p class="subheading">Enter your details to access your account.</p>

            <button class="google-btn">Sign in with Google</button>

            <form action="#">
                <label for="email">
                    Email<br>
                    <input type="email" name="email" placeholder="Enter your email">
                </label><br>
                <label for="password">
                    Password<br>
                    <input type="password" name="password" placeholder="Enter your password">
                </label>
                <div class="pass">
                    <label for="Remember"><input type="checkbox"> Remember me</label>
                    <a href="#">Forget password ?</a>
                </div>
            </form>

            <button class="signup-btn">Sign in</button>
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
        <div class="img card">
            <img src="./main.png" alt="image of dashboard" class="main-img">
        </div>
    </div>
</body>
</html>
