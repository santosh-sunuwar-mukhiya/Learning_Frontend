<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="container">
            <section class="card">
                <div class="card-head">
                    <h1>Welcome back</h1>
                    <p class="subheading">Enter your details to access your account.</p>
                </div>

                <button class="google-btn">Sign in with Google</button>

                <div class="or-divider">
                    <span></span>
                    <span>or</span>
                    <span></span>
                </div>

                <form action="#" class="login-form">
                    <label class="input-group" for="email">
                        <span>Email</span>
                        <input id="email" type="email" name="email" placeholder="Enter your email" required>
                    </label>
                    <label class="input-group" for="password">
                        <span>Password</span>
                        <input id="password" type="password" name="password" placeholder="Enter your password" required>
                    </label>

                    <div class="form-footer">
                        <label class="remember">
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forget password?</a>
                    </div>

                    <button class="signin-btn" type="submit">Sign in</button>
                </form>

                <p class="register-text">Don't have an account? <a href="#">Register</a></p>
            </section>

            <section class="hero-panel">
                <div class="hero-copy">
                    <span class="hero-badge">Winning</span>
                    <h2>Effortless Sales Tracking for Smarter Decisions</h2>
                    <p>Stay ahead with real-time insights, performance analytics, and data-driven sales strategies. All in one powerful dashboard.</p>
                </div>
                <div class="hero-frame">
                    <img src="./main.png" alt="dashboard screenshot" class="main-img">
                </div>
            </section>
        </div>
    </div>
</body>
</html>
